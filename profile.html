<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3>User Profile</h3>
            <hr>
            <div id="displaySection">
                <p><strong>Age:</strong> <span id="dispAge">Loading...</span></p>
                <p><strong>DOB:</strong> <span id="dispDob">Loading...</span></p>
                <p><strong>Contact:</strong> <span id="dispContact">Loading...</span></p>
            </div>
            <hr>
            <h4>Update Information</h4>
            <form id="updateForm">
                <input type="number" id="age" class="form-control mb-2" placeholder="Enter Age">
                <input type="date" id="dob" class="form-control mb-2">
                <input type="text" id="contact" class="form-control mb-2" placeholder="Enter Contact">
                <button type="submit" class="btn btn-warning">Update Profile</button>
            </form>
            <button id="logout" class="btn btn-danger mt-3">Logout</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
